<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>2D Fighting Game - Advance</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { background: #111; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #gameContainer { position: relative; width: 800px; height: 400px; background: skyblue; border: 4px solid #fff; border-radius: 10px; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; }
        #ui { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; color: white; font-size: 20px; font-weight: bold; text-shadow: 2px 2px 4px black; }
        .hp-bar { width: 150px; height: 15px; background: red; border: 2px solid white; display: inline-block; vertical-align: middle; }
        .hp-fill { height: 100%; background: #2ecc71; width: 100%; transition: width 0.1s; }
        #controls { position: absolute; bottom: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; align-items: center; }
        .btn-group { display: flex; gap: 10px; }
        .btn { width: 70px; height: 70px; border-radius: 50%; border: 3px solid white; font-weight: bold; font-size: 14px; color: white; cursor: pointer; text-shadow: 1px 1px 2px black; box-shadow: 0 4px 6px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; }
        #runBtn { background: #9c27b0; border-radius: 10px; width: 80px; height: 55px; } /* दौड़ने का बटन चौकोर आकार में */
        #punchBtn { background: #ff5722; }
        #kickBtn { background: #2196f3; }
        .btn:active, .btn.active { transform: scale(0.9); opacity: 0.8; }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <div id="ui">
        <div>Player HP: <div class="hp-bar"><div id="playerHp" class="hp-fill"></div></div></div>
        <div>Coins: <span id="scoreVal">0</span></div>
        <div>Enemy HP: <div class="hp-bar"><div id="enemyHp" class="hp-fill"></div></div></div>
    </div>
    <div id="controls">
        <!-- बायीं तरफ दौड़ने का बटन -->
        <button id="runBtn" class="btn">RUN</button>
        <!-- दायीं तरफ हमले के बटन -->
        <div class="btn-group">
            <button id="punchBtn" class="btn">PUNCH</button>
            <button id="kickBtn" class="btn">KICK</button>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const scoreVal = document.getElementById("scoreVal");
const playerHpBar = document.getElementById("playerHp");
const enemyHpBar = document.getElementById("enemyHp");

// इमेज लोड करना (720x392 साइज)
const spriteSheet = new Image();
spriteSheet.src = 'spritesheet.png'; 

// ऑडियो जनरेटर (बिना फाइल के साउंड)
function playSound(type) {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    
    if (type === 'coin') {
        osc.frequency.setValueAtTime(587.33, audioCtx.currentTime);
        osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    } else if (type === 'hit') {
        osc.frequency.setValueAtTime(120, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        osc.start(); osc.stop(audioCtx.currentTime + 0.15);
    }
}

// स्प्राइट 720x392 के लिए सटीक 3x3 ग्रिड सेटिंग्स
const spriteW = 720 / 3; // 240px
const spriteH = 392 / 3; // 130.66px

const FRAMES = {
    STAND: {x: 0, y: 0}, CROUCH: {x: 1, y: 0}, JUMP: {x: 2, y: 0},
    ATTACK: {x: 0, y: 1}, RUN1: {x: 1, y: 1}, RUN2: {x: 2, y: 1},
    RUN3: {x: 0, y: 2}, RUN4: {x: 1, y: 2}, KO: {x: 2, y: 2}
};

const runLoop = [FRAMES.RUN1, FRAMES.RUN2, FRAMES.RUN3, FRAMES.RUN4];

// गेम स्टेट्स
let score = 0;
let bgOffset = 0;
let isRunning = false;
let gameFrame = 0;

// कैरेक्टर ऑब्जेक्ट्स
const player = {
    x: 100, y: 240, baseY: 240, w: 150, h: 95, hp: 100, maxHp: 100,
    state: FRAMES.STAND, vy: 0, isJumping: false, isCrouching: false, isAttacking: false, attackTimer: 0, runAnimIdx: 0
};

const enemy = {
    x: 600, y: 240, baseY: 240, w: 150, h: 95, hp: 100, maxHp: 100,
    state: FRAMES.STAND, vy: 0, isJumping: false, isAttacking: false, attackTimer: 0, runAnimIdx: 0,
    isDead: false, respawnTimer: 0, actionTimer: 60, speed: -3
};

const coin = { x: 900, y: 200, size: 12, active: true };

function drawWavyHills() {
    // अगर प्लेयर दौड़ रहा है तो बैकग्राउंड तेजी से पीछे भागेगा
    if (isRunning && !player.isAttacking && !player.isCrouching) {
        bgOffset += 4;
    } else {
        bgOffset += 1;
    }
    
    // बैक हिल
    ctx.fillStyle = "#27ae60";
    ctx.beginPath(); ctx.moveTo(0, canvas.height);
    for (let x = 0; x <= canvas.width; x++) {
        let y = 270 + Math.sin((x + bgOffset) * 0.005) * 35;
        ctx.lineTo(x, y);
    }
    ctx.lineTo(canvas.width, canvas.height); ctx.fill();

    // फ्रंट हिल
    ctx.fillStyle = "#2ecc71";
    ctx.beginPath(); ctx.moveTo(0, canvas.height);
    for (let x = 0; x <= canvas.width; x++) {
        let y = 310 + Math.sin((x + bgOffset * 1.3) * 0.01) * 20;
        ctx.lineTo(x, y);
    }
    ctx.lineTo(canvas.width, canvas.height); ctx.fill();
}

function drawCharacter(char, frame, mirror = false) {
    ctx.save();
    if (mirror) {
        ctx.translate(char.x + char.w, char.y);
        ctx.scale(-1, 1);
        ctx.drawImage(spriteSheet, frame.x * spriteW, frame.y * spriteH, spriteW, spriteH, 0, 0, char.w, char.h);
    } else {
        ctx.drawImage(spriteSheet, frame.x * spriteW, frame.y * spriteH, spriteW, spriteH, char.x, char.y, char.w, char.h);
    }
    ctx.restore();
}

// प्लेयर का हमला (पंच/किक दोनों में अटैक पोज़ दिखेगा)
function playerAttack() {
    if (player.isCrouching || player.isJumping || player.isAttacking) return;
    player.isAttacking = true;
    player.state = FRAMES.ATTACK;
    player.attackTimer = 12;

    // दुश्मन से दूरी और कोलिशन चेक
    if (!enemy.isDead && Math.abs((player.x + player.w - 40) - enemy.x) < 70) {
        enemy.hp -= 25;
        if (enemy.hp <= 0) {
            enemy.hp = 0; enemy.isDead = true; enemy.state = FRAMES.KO;
            enemy.respawnTimer = 90; score += 20; scoreVal.innerText = score;
        }
        enemyHpBar.style.width = (enemy.hp / enemy.maxHp * 100) + "%";
        playSound('hit');
    }
}

// दुश्मन का AI ऑटो-अटैक सिस्टम
function updateEnemyAI() {
    if (enemy.isDead) {
        enemy.respawnTimer--;
        if (enemy.respawnTimer <= 0) {
            enemy.isDead = false; enemy.hp = 100;
            enemyHpBar.style.width = "100%"; enemy.x = 700;
            enemy.state = FRAMES.STAND;
        }
        return;
    }

    enemy.actionTimer--;
    if (enemy.actionTimer <= 0) {
        // यादृच्छिक (Random) निर्णय: 0 = आराम/दौड़ना, 1 = कूदना, 2 = हमला करने आगे बढ़ना
        let decision = Math.floor(Math.random() * 3);
        enemy.actionTimer = 60 + Math.random() * 60; 

        if (decision === 1 && !enemy.isJumping) {
            enemy.isJumping = true; enemy.vy = -12;
        }
    }

    // दुश्मन का मूवमेंट (प्लेयर की तरफ आना)
    let distance = enemy.x - (player.x + player.w - 50);
    
    if (distance > 50 && !enemy.isAttacking) {
        enemy.x += enemy.speed;
        // दौड़ने का एनिमेशन लूप
        if (gameFrame % 6 === 0) {
            enemy.runAnimIdx = (enemy.runAnimIdx + 1) % runLoop.length;
        }
        enemy.state = runLoop[enemy.runAnimIdx];
    } else if (distance <= 50 && !enemy.isAttacking) {
        // पास आते ही दुश्मन का हमला
        enemy.isAttacking = true;
        enemy.state = FRAMES.ATTACK;
        enemy.attackTimer = 15;

        // प्लेयर को चोट लगना (अगर प्लेयर बैठा या कूदा न हो)
        if (!player.isCrouching && !player.isJumping) {
            player.hp -= 15;
            if (player.hp < 0) player.hp = 0;
            playerHpBar.style.width = (player.hp / player.maxHp * 100) + "%";
            playSound('hit');
        }
    }

    // दुश्मन का जंप और अटैक रिफ्रेश लॉजिक
    if (enemy.isJumping) {
        enemy.y += enemy.vy; enemy.vy += 0.7;
        enemy.state = FRAMES.JUMP;
        if (enemy.y >= enemy.baseY) { enemy.y = enemy.baseY; enemy.isJumping = false; }
    }
    if (enemy.isAttacking) {
        enemy.attackTimer--;
        if (enemy.attackTimer <= 0) { enemy.isAttacking = false; enemy.state = FRAMES.STAND; }
    }
}

// दौड़ने के बटन के लिए होल्ड/टच इवेंट्स
const runBtn = document.getElementById("runBtn");
['touchstart', 'mousedown'].forEach(evt => {
    runBtn.addEventListener(evt, (e) => { e.preventDefault(); isRunning = true; });
});
['touchend', 'mouseup', 'mouseleave'].forEach(evt => {
    runBtn.addEventListener(evt, () => { isRunning = false; });
});

// पंच और किक बटन इवेंट्स
document.getElementById("punchBtn").addEventListener("click", playerAttack);
document.getElementById("kickBtn").addEventListener("click", playerAttack);

// स्क्रीन स्वाइप (Glide) से जंप और बैठना
let touchStartY = 0;
canvas.addEventListener('touchstart', (e) => { touchStartY = e.touches[0].clientY; });
canvas.addEventListener('touchend', (e) => {
    let diffY = touchStartY - e.changedTouches[0].clientY;
    if (diffY > 40 && !player.isJumping && !player.isCrouching) {
        player.isJumping = true; player.vy = -14; player.state = FRAMES.JUMP;
    } else if (diffY < -40 && !player.isJumping) {
        player.isCrouching = true; player.state = FRAMES.CROUCH;
   setTimeout(() => { player.isCrouching = false; }, 800);}});
// मुख्य गेम लूप
function update() {gameFrame++;ctx.clearRect(0, 0, canvas.width, canvas.height);drawWavyHills();updateEnemyAI();
// प्लेयर एनिमेशन और मूवमेंट अपडेट
if (player.isJumping) {player.y += player.vy; player.vy += 0.7;
if (player.y >= player.baseY) { player.y = player.baseY; 
player.isJumping = false; 
player.state = FRAMES.STAND; }} 
else if (player.isCrouching) {player.state = FRAMES.CROUCH;} 
else if (player.isAttacking) {player.attackTimer--;
if (player.attackTimer <= 0) { player.isAttacking = false;
player.state = FRAMES.STAND; }} else if (isRunning) {
// दौड़ते समय प्लेयर थोड़ा आगे बढ़ता है और पैरों का फ्रेम बदलता है
if (gameFrame % 6 === 0) {player.runAnimIdx = (player.runAnimIdx + 1) % runLoop.length;}
player.state = runLoop[player.runAnimIdx];
if (player.x < 300) player.x += 1.5; 
// अधिकतम सीमा तक ही आगे बढ़ेगा
} else {player.state = FRAMES.STAND;
if (player.x > 100) player.x -= 2; 
// रुकने पर धीरे से अपनी सामान्य जगह पर पीछे आएगा
}// कॉइन सिस्टम
if (coin.active) {
// अगर खिलाड़ी दौड़ रहा है तो सिक्के तेजी से पास आएंगे
coin.x -= isRunning ? 6 : 3;
ctx.fillStyle = "gold"; ctx.beginPath(); 
ctx.arc(coin.x, coin.y, coin.size, 0, Math.PI * 2);
ctx.fill();let dist = Math.hypot(coin.x - (player.x + player.w/2), coin.y - (player.y + player.h/2));
if (dist < coin.size + 45) {coin.active = false; score += 5; scoreVal.innerText = score;
playSound('coin');}if (coin.x < -20) coin.active = false;} 
else if (Math.random() < 0.015) {coin.x = canvas.width + 20;
coin.y = 190 + Math.random() * 70; 
coin.active = true;}// दोनों कैरेक्टर रेंडर करें
drawCharacter(player, player.state, false);
drawCharacter(enemy, enemy.state, true);
// गेम ओवर चेक
if (player.hp <= 0) {ctx.fillStyle = "rgba(0,0,0,0.7)";
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle = "white"; ctx.font = "40px sans-serif"; 
ctx.textAlign = "center";ctx.fillText("GAME OVER", canvas.width/2, canvas.height/2);
return; // गेम रोक दें}requestAnimationFrame(update);}
spriteSheet.onload = () => { update(); }
</script>
</body>
</html>
